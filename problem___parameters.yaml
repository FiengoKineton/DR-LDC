params:
  dimensions: {nx: 7, nu: 1, nw: 2, ny: 3}                                      # set
  method: "lmi"                                                                 # set | may be var ("lmi" or "base")
  upd: 1                                                                        # set
  model: "independent"                                                          # set | may be var ("correlated" or "independent")
  FROM_DATA: 1                                                                  # VAR ------------------------------ true or false
  approach: "Mats"                                                              # VAR ------------------------------ ("DeePC", "Young", "Mats")
  comp: 0                                                                       # VAR ------------------------------ true or false
  save: 1                                                                       # VAR ------------------------------ true or false
  plot: 0                                                                       # VAR ------------------------------ true or false
  ALL: 0                                                                        # VAR ------------------------------ true or false
  COST: 0                                                                       # VAR ------------------------------ true or false
  use_set_out_mats: 0                                                           # set | may be var (true or false)
  SNR: 0                                                                        # set
  solver: "MOSEK"                                                               # set | may bbe var ("MOSEK", "CVXPY", "SCS")
  re_evaluate: 0                                                                # VAR ------------------------------ true or false
  init_cond: "rand"                                                               # VAR ------------------------------ ("zeros", "rand", "e1")

  simulation:
    ts: 0.05                                                                    # set
    TotTime: 100                                                                 # set
  
  ident:
    use_bc: 0                                                                   # set | not used yet
    use_iv: 0                                                                   # set | not used yet
    zero_mean: 0                                                                # set | leave it at 0
    X_iv_path: "data/experiment_iv_states.csv"                                  # set | not used yet
    stabilise: 0                                                                # set | leave it at 0
  
  directories:
    data: "./out/data/session_"                                                 # set
    artifacts: "./out/artifacts/"                                               # set
    runID: "temp3"                                                               # VAR ------------------------------ look for the names in main.py

  plant:
    A_mat:  [[0.9,0.1,0,0],[0,0.88,0.1,0],[0,0,0.86,0.1],[0,0,0,0.84]]          # set
    Bu_mat: [[0.3,0.0],[0.0,0.3],[0.1,-0.2],[0.0,0.1]]                          # set
    Bw_mat: [[1,0],[0,1],[0,0],[0,0]]                                           # set

    type: PaperLike                                                             # set
    seed: 42                                                                    # set
    A: {eig_min: 0.7, eig_max: 0.95}                                            # set


  ambiguity:
    model: "W2"                                                                 # VAR ------------------------------ [W2, zero, Gaussian]
    gamma: 0.5                                                                  # set
    fixGamma: 1                                                                 # set | may be var (true or false)
    Sigma_nom: [[1.0, 0.0], [0.0, 1.0]]                                         # set
    var: 1                                                                      # set
  

  outputs:
    mode: "A"                                                                   # set | (penalize states & inputs directly) if B then (penalize measured output & inputs)

    Qx_diag: [1.0, 1.0]                                                         # set
    Ru_diag: [1.0]                                                              # set
    Wy_diag: [1.0, 1.0]                                                         # set


    measured:
      select: "first"                                                           # set | or "random"
      dyw_zero: 1                                                               # set | Dyw = 0 unless you really measure w
