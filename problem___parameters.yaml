params:
  dimensions: {nx: 7, nu: 1, nw: 2, ny: 3}  # {nx: 4, nu: 2, nw: 2, ny: 2}
  model: "correlated"                       # "independent" | "correlated"  => the paper uses Correlated
  FROM_DATA: false                           # true => use data-driven DRO-LDC | false => use model-based DRO-LDC

  simulation:
    ts: 0.05
    TotTime: 25
  
  directories:
    data: "./out/data/session_02"
    artifacts: "./out/artifacts/"

  plant:
    #type: explicit  # change to random_stable if there a change of dimensions
    A_mat:  [[0.9,0.1,0,0],[0,0.88,0.1,0],[0,0,0.86,0.1],[0,0,0,0.84]]
    Bu_mat: [[0.3,0.0],[0.0,0.3],[0.1,-0.2],[0.0,0.1]]
    Bw_mat: [[1,0],[0,1],[0,0],[0,0]]

    type: PaperLike                       # Keep this
    seed: 42
    A: {eig_min: 0.7, eig_max: 0.95}


  ambiguity:
    model: "W2"                           # "W2" => Wasserstein-2 | "KL" => Kullback-Leibler
    gamma: 0.5                            # 0.028251205750965087
    Sigma_nom: [[1.0, 0.0], [0.0, 1.0]]   # [[0.64033495, -0.44049879], [-0.44049879, 0.46091297]]
  

  outputs:
    mode: "A"                             # (penalize states & inputs directly) | "A" => z = [ Qx^{1/2} x ; Ru^{1/2} u ]
    #mode: "B"                             # (penalize measured output & inputs) | "B" => z = [ W_y y ; Ru^{1/2} u ], with y = C_y x + D_yw w

    Qx_diag: [1.0, 1.0]                   # diag entries of Q_x  (size nx)
    Ru_diag: [1.0]                        # diag entries of R_u  (size nu)
    Wy_diag: [1.0, 1.0]                   # diag entries of W_y  (size ny)


    measured:
      select: "first"                     # or "random"
      dyw_zero: true                      # Dyw = 0 unless you really measure w
