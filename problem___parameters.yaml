params:
  dimensions: {nx: 7, nu: 1, nw: 2, ny: 3}                                      # set
  method: "lmi"                                                                 # VAR ------------------------------ "lmi" or "base"
  model: "correlated"                                                           # VAR ------------------------------ "correlated" or "independent"
  FROM_DATA: 1                                                                  # VAR ------------------------------ true or false

  save: 0                                                                       # VAR ------------------------------ true or false
  plot: 0                                                                       # VAR ------------------------------ true or false
  ALL: 0                                                                        # VAR ------------------------------ true or false
  use_set_out_mats: 0                                                           # VAR ------------------------------ true or false


  simulation:
    ts: 0.05                                                                    # set
    TotTime: 50                                                                 # set
  
  ident:
    use_bc: 0                                                                   # set | not used yet
    use_iv: 0                                                                   # set | not used yet
    zero_mean: 0                                                                # set | leave it at 0
    X_iv_path: "data/experiment_iv_states.csv"                                  # set | not used yet
    stabilise: 0                                                                # set | leave it at 0
  
  directories:
    data: "./out/data/session_"                                                 # set
    artifacts: "./out/artifacts/"                                               # set
    runID: "temp"                                                               # VAR ------------------------------ look for the names in main.py

  plant:
    A_mat:  [[0.9,0.1,0,0],[0,0.88,0.1,0],[0,0,0.86,0.1],[0,0,0,0.84]]          # set
    Bu_mat: [[0.3,0.0],[0.0,0.3],[0.1,-0.2],[0.0,0.1]]                          # set
    Bw_mat: [[1,0],[0,1],[0,0],[0,0]]                                           # set

    type: PaperLike                                                             # set
    seed: 42                                                                    # set
    A: {eig_min: 0.7, eig_max: 0.95}                                            # set


  ambiguity:
    model: "Gaussian"                                                           # VAR ------------------------------ [W2, zero, Gaussian]
    gamma: 0.5                                                                  # VAR ------------------------------ look for the values in main.py
    fixGamma: 1                                                                 # VAR ------------------------------ true or false
    Sigma_nom: [[1.0, 0.0], [0.0, 1.0]]                                         # set
    var: 1                                                                      # VAR ------------------------------
  

  outputs:
    mode: "A"                                                                   # set | (penalize states & inputs directly) if B then (penalize measured output & inputs)

    Qx_diag: [1.0, 1.0]                                                         # set
    Ru_diag: [1.0]                                                              # set
    Wy_diag: [1.0, 1.0]                                                         # set


    measured:
      select: "first"                                                           # set | or "random"
      dyw_zero: 1                                                               # set | Dyw = 0 unless you really measure w
